# ========================================
# Smart City Backend - Persistent Config
# ========================================

spring.application.name=smart-city-backend

# --- H2 Database (Persistent File Mode) ---
# This will create a file named 'smartcity_data.mv.db' in your project root
spring.datasource.url=jdbc:h2:file:./smartcity_data;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# 'update' keeps existing data and only modifies structure if needed
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- H2 Console ---
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Gemini AI Configuration ---
# Use 'setx GEMINI_API_KEY "your_key"' in windows to set the environment variable
ai.gemini.secret=AIzaSyCLe03dVSogASEvM3A51JfpVHaKY23Mgho
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# --- Server Port and Limits ---
server.port=8080
server.max-http-header-size=64KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- Resilience4j (Circuit Breaker & Retry) ---
resilience4j.circuitbreaker.instances.geminiService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.geminiService.slidingWindowSize=5
resilience4j.circuitbreaker.instances.geminiService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.geminiService.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.geminiService.permittedNumberOfCallsInHalfOpenState=2
resilience4j.retry.instances.geminiService.maxAttempts=2
resilience4j.retry.instances.geminiService.waitDuration=1s

# --- RabbitMQ (Message-Oriented Middleware) ---
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
# Lazy connection: app starts even if RabbitMQ is not running
spring.rabbitmq.connection-timeout=3000
spring.rabbitmq.listener.simple.missing-queues-fatal=false
